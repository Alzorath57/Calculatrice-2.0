<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="style.css">
  <title>NewCalculatrice</title>
</head>
<body>
  <div class="calculatrice">
    <div class="ecran1">
      <div id="ligne-calcul"></div>
      <div id="ligne-resultat"></div>
    </div>
  <div class="boutons">
    <button data-chiffre="0">0</button>
    <button data-chiffre="1">1</button>
    <button data-chiffre="2">2</button>
    <button data-chiffre="3">3</button>
    <button data-chiffre="4">4</button>
    <button data-chiffre="5">5</button>
    <button data-chiffre="6">6</button>
    <button data-chiffre="7">7</button>
    <button data-chiffre="8">8</button>
    <button data-chiffre="9">9</button>
    <button data-action="+">+</button>
    <button data-action="-">-</button>
    <button data-action="/">÷</button>
    <button data-action="*">x</button>
    <button data-action="=">=</button>
    <button data-action="C">C</button>
    <button data-action="CE">CE</button>
    <button data-action="⌫">⌫</button>
    <button data-action="±">±</button>
    <button data-action="%">%</button>
    <button data-action="√x">√x</button>
    <button data-action="x²">x²</button>
    <button data-action=".">,</button>
    <button data-action="1/x">1/x</button>
  </div>
  </div> 
  <script src="app.js"></script>
</body>
</html>
